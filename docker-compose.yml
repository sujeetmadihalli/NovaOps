services:
  localstack:
    container_name: localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"          # LocalStack Gateway
    environment:
      - SERVICES=s3,dynamodb # Use LocalStack for both S3 and DynamoDB!
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - novaops_net

  novaops-api:
    container_name: novaops-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8000"          # Expose API on host port 8082
    env_file:
      - .env                   # Real AWS creds for Bedrock LLM
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_EC2_METADATA_DISABLED=true
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - S3_ENDPOINT=http://localstack:4566
      - NOVAOPS_LOG_PATH=/var/log/novaops/novaops.log
      - NOVAOPS_USE_MOCK=1
    volumes:
      - ./runbooks:/app/runbooks:rw     # Mount runbooks for TF-IDF indexing
      - novaops-logs:/var/log/novaops   # Persist logs without host file pre-creation
    command: sh -c "mkdir -p /var/log/novaops && touch /var/log/novaops/novaops.log && uvicorn api.server:app --host 0.0.0.0 --port 8000"
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - novaops_net

volumes:
  localstack-data:
  novaops-logs:

networks:
  novaops_net:
    driver: bridge
